<!DOCTYPE html>
<html>
<head>
  <title>LLR Portal</title>
</head>
<body>

<h1>LLR Portal 🔐</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status">Not logged in</p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjrj8IQ66Hy1pZ-k6aYHgrTsSKOMNmlPI",
    authDomain: "llrfans.firebaseapp.com",
    projectId: "llrfans",
    storageBucket: "llrfans.firebasestorage.app",
    messagingSenderId: "807887411037",
    appId: "1:807887411037:web:6d6ea6a2e363130509fab4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.signup = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Account created"))
      .catch(e => alert(e.message));
  }

  window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Logged in"))
      .catch(e => alert(e.message));
  }

  window.logout = function() {
    signOut(auth);
  }

  onAuthStateChanged(auth, user => {
    document.getElementById("status").innerText =
      user ? "Logged in as: " + user.email : "Not logged in";
  });
</script>

</body>
</html>
